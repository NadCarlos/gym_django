{% extends "home/base.html" %}

{% block content %}
<div class="container mt-5">
    <h2 class="d-flex justify-content-center mb-4">Gestionar Agenda</h2>
    <div class="card p-4 shadow-sm">
        <form id="form-tratamiento" method="post">
            {% csrf_token %}
            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Fecha:</label>
                <div class="col-sm-6">
                    {{ form.fecha }}
                </div>
                <div class="col-sm-4">
                </div>
            </div>
            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Hora Inicio:</label>
                <div class="col-sm-6">
                    {{ form.hora_inicio }}
                </div>
                <div class="col-sm-4">
                </div>
            </div>
            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Hora Fin:</label>
                <div class="col-sm-6">
                    {{ form.hora_fin }}
                </div>
                <div class="col-sm-4">
                </div>
            </div>
            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Dia:</label>
                <div class="col-sm-6">
                    {{ form.id_dia }}
                </div>
                <div class="col-sm-4">
                </div>
            </div>

            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Profesional:</label>
                <div class="col-sm-6">
                    <select class="form-control custom-class" id="select-profesional" name="profesional">
                        <option value="">Seleccione un profesional</option>
                        {% for profesional in profesionales %}
                        <option value="{{ profesional.id }}">{{ profesional.apellido }}, {{ profesional.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Tratamiento:</label>
                <div class="col-sm-6">
                    <select class="form-control custom-class" id="select-tratamiento" name="id_profesional_tratamiento" disabled>
                        <option value="">Seleccione un tratamiento</option>
                    </select>
                </div>
            </div>
            
            {{ form.id_usuario }}
            <div class="d-flex justify-content-center">
                <button type="submit" class=" btn btn-success">
                    <i class="bi bi-save"></i> Guardar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const selectProfesional = document.getElementById("select-profesional");
    const selectTratamiento = document.getElementById("select-tratamiento");

    selectProfesional.addEventListener("change", function() {
        const profesionalId = this.value;

        // Si no seleccionó nada, volvemos a deshabilitar
        if (!profesionalId) {
            selectTratamiento.innerHTML = '<option value="">Seleccione un tratamiento</option>';
            selectTratamiento.disabled = true;
            return;
        }

        // Petición AJAX a tu vista
        fetch(`/administracion/tratamientos/${profesionalId}/`)
            .then(response => response.json())
            .then(data => {
                // Limpiar y habilitar el select
                selectTratamiento.innerHTML = '<option value="">Seleccione un tratamiento</option>';
                data.forEach(tratamiento => {
                    const option = document.createElement("option");
                    option.value = tratamiento.id;
                    option.textContent = tratamiento.nombre;
                    selectTratamiento.appendChild(option);
                });
                selectTratamiento.disabled = false;
            })
            .catch(error => {
                console.error("Error al cargar tratamientos:", error);
            });
    });
});
</script>

{% endblock %}
