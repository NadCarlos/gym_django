{% extends "home/base.html" %}

{% block content %}
{{ path }}
<input type="hidden" name="next" value="{{ path }}">
<div class="container mt-5">
    <h2 class="d-flex justify-content-center mb-4">Gestionar Agenda: {{ paciente.nombre }}, {{ paciente.apellido }}</h2>
    <div class="card p-4 shadow-sm">
        <form method="post">
            {% csrf_token %}
            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Hora Inicio:</label>
                <div class="col-sm-6">
                    {{ form.hora_inicio }}
                </div>
                <div class="col-sm-4">
                </div>
            </div>
            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Hora Fin:</label>
                <div class="col-sm-6">
                    {{ form.hora_fin }}
                </div>
                <div class="col-sm-4">
                </div>
            </div>
            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Dia:</label>
                <div class="col-sm-6">
                    {{ form.id_dia }}
                </div>
                <div class="col-sm-4">
                </div>
            </div>

            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Profesional:</label>
                <div class="col-sm-6">
                    <select class="form-control custom-class" id="select-profesional" name="select">
                        <option value="{{ profesional_old.id }}">{{ profesional_old.apellido }}, {{ profesional_old.nombre }}</option>
                        {% for profesional in profesionales %}
                            {% if profesional.id != profesional_old.id %}
                                <option value="{{ profesional.id }}">{{ profesional.apellido }}, {{ profesional.nombre }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>                    
                </div>
                <div class="col-sm-4">
                </div>
            </div>
            <div class="mb-2 row">
                <label class="d-flex justify-content-end col-sm-2 col-form-label">Tratamiento:</label>
                <div class="col-sm-6">
                    <select class="form-control custom-class" id="select-tratamiento" name="id_profesional_tratamiento">
                        <option value="{{ tratamiento_old.id }}" >{{ tratamiento_old }}</option>
                        {% for tratamiento in tratamientosActivos %}
                            {% if tratamiento.id != tratamiento_old.id_tratamiento.id or tratamiento_old.id_profesional.id == profesional_old.id %}
                                <option value="{{ tratamiento.id }}" data-profesional-id="{{ tratamiento.id_profesional.id }}">
                                    {{ tratamiento }}
                                </option>
                            {% endif %}
                        {% endfor %}
                    </select>                    
                </div>
                <div class="col-sm-4">
                </div>
            </div>
            <div class="d-flex justify-content-center">
                <button type="submit" class=" btn btn-success">
                    <i class="bi bi-save"></i> Guardar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const selectProfesional = document.getElementById("select-profesional");
    const selectTratamiento = document.getElementById("select-tratamiento");

    const tratamientoOldId = "{{ tratamiento_old.id|default:'' }}";

    function cargarTratamientos() {
        const profesionalId = selectProfesional.value;

        if (!profesionalId) {
            selectTratamiento.innerHTML = '<option value="">Seleccione un tratamiento</option>';
            return;
        }

        const url = `/administracion/tratamientos/${profesionalId}/`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                selectTratamiento.innerHTML = "";

                const defaultOption = document.createElement("option");
                defaultOption.value = "";
                defaultOption.textContent = "Seleccione un tratamiento";
                selectTratamiento.appendChild(defaultOption);

                data.forEach(tratamiento => {
                    const option = document.createElement("option");
                    option.value = tratamiento.id;
                    option.textContent = tratamiento.nombre;

                    if (tratamiento.id.toString() === tratamientoOldId) {
                        option.selected = true;
                    }

                    selectTratamiento.appendChild(option);
                });
            })
            .catch(error => {
                console.error("Error al cargar tratamientos:", error);
            });
    }

    // evento normal
    selectProfesional.addEventListener("change", cargarTratamientos);

    // EJECUCIÓN AUTOMÁTICA AL ENTRAR A LA PÁGINA
    if (selectProfesional.value) {
        cargarTratamientos();
    }
});
</script>
{% endblock %}
