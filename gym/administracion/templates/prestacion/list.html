{% extends base_template %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Lista de Prestaciones</h2>

    <div class="row">
        <!-- Primera columna -->
        <div class="col-md-8">
            <a href="{% url 'prestacion_create' area %}" class="btn btn-success mb-4">
                <i class="bi bi-plus-circle"></i> Nueva Prestación
            </a>
        </div>
        <!-- Segunda columna -->
        <div class="col-md-2">
        </div>
        <!-- Tercera columna -->
        <div class="col-md-2">
            <div class="card text-white bg-dark mb-3" style="max-width: 18rem;">
                <div class="card-body p-2">
                    <p class="card-text text-center fw-bold mb-0">Total Registros: {{ prestaciones_count }}</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="table-responsive">
        <table class="table table-striped table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for prestacion in prestaciones %}
                <tr>
                    <td>{{ prestacion.nombre }}</td>
                    <td>{{ prestacion.descripcion }}</td>
                    <td>
                        <a href="{% url 'prestacion_delete' prestacion.id area %}" class="btn btn-danger btn-sm me-2">
                            <i class="bi bi-trash"></i> Borrar
                        </a>
                        <a href="{% url 'prestacion_update' prestacion.id area %}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
