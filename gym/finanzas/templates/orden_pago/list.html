{% extends 'home/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4 text-center"><i class="bi bi-receipt"></i> Lista de Órdenes de Pago</h2>

    <div class="table-responsive">
        <table class="table table-striped table-hover table-bordered align-middle">
            <thead class="table-dark text-center">
                <tr>
                    <th>Beneficiario</th>
                    <th>Número</th>
                    <th>Total</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody class="text-center">
                {% for orden in ordenes %}
                <tr>
                    <td class="fw-bold"><i class="bi bi-person-circle"></i> {{ orden.id_beneficiario.nombre }}</td>
                    <td>{{ orden.numero }}</td>
                    <td class="text-success fw-bold">$ {{ orden.total }}</td>
                    <td>{{ orden.fecha }}</td>
                    <td>
                        <a href="{% url 'detail' orden.id %}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver Detalle
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
