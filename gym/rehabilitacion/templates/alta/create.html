{% extends 'inicio/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Nueva Alta</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.id_paciente_rehabilitacion }}

        <div class="mb-3">
            <label for="{{ form.fecha.id_for_label }}" class="form-label">Fecha</label>
            {{ form.fecha }}
        </div>

        <div class="mb-3">
            <label class="form-label">Familia</label>
            <select name="{{ form.id_familia.name }}" id="id_familia" class="form-control">
                <option value="">----------</option>
                {% for fam in form.id_familia.field.queryset %}
                    <option value="{{ fam.pk }}">{{ fam }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="{{ form.id_diagnostico.id_for_label }}" class="form-label">Diagnóstico</label>
            <select name="{{ form.id_diagnostico.name }}" id="id_diagnostico" class="form-control">
                <option value="">----------</option>
                {% for diag in form.id_diagnostico.field.queryset %}
                    <option value="{{ diag.pk }}">{{ diag }}</option>
                {% endfor %}
                <option value="nuevo">Nuevo Diagnóstico</option>
            </select>
        </div>

        <div class="mb-3" id="nuevo_diagnostico_container" style="display:none;">
            <label for="nuevo_diagnostico" class="form-label">Nombre del nuevo diagnóstico</label>
            <input type="text" name="nuevo_diagnostico" id="nuevo_diagnostico" class="form-control" placeholder="Ingrese diagnóstico">
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="#" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const familiaSelect = document.getElementById("id_familia");
    const diagnosticoSelect = document.getElementById("id_diagnostico");
    const nuevoDiagContainer = document.getElementById("nuevo_diagnostico_container");

    // Al inicio deshabilito diagnóstico
    diagnosticoSelect.disabled = true;

    // Cambio de familia
    familiaSelect.addEventListener("change", function() {
        const familiaId = this.value;
        diagnosticoSelect.innerHTML = ""; // limpio el select
        diagnosticoSelect.disabled = true;

        if (familiaId) {
            fetch(`/rehabilitacion/diagnosticos/${familiaId}`)
                .then(response => response.json())
                .then(data => {
                    // cargo opciones
                    data.forEach(diagnostico => {
                        const option = document.createElement("option");
                        option.value = diagnostico.id;
                        option.textContent = diagnostico.nombre;
                        diagnosticoSelect.appendChild(option);
                    });

                    // agrego la opción "Nuevo Diagnóstico"
                    const nuevoOption = document.createElement("option");
                    nuevoOption.value = "nuevo";
                    nuevoOption.textContent = "Nuevo Diagnóstico";
                    diagnosticoSelect.appendChild(nuevoOption);

                    diagnosticoSelect.disabled = false;
                });
        }
    });

    // Mostrar/ocultar input para nuevo diagnóstico
    diagnosticoSelect.addEventListener("change", function() {
        if (this.value === "nuevo") {
            nuevoDiagContainer.style.display = "block";
        } else {
            nuevoDiagContainer.style.display = "none";
        }
    });
});
</script>
{% endblock %}
