{% extends 'inicio/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Nuevo Diagnostico Funcional</h2>
    {% if error_message %}
        <div class="alert alert-danger" role="alert">
            {{ error_message }}
        </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.id_alta }}
        {{ form.id_usuario }}

        <label for="{{ form.observaciones.id_for_label }}" class="form-label">Seleccione un diagnostico</label>
        <select class="form-control custom-class" id="select-diagnostico-funcional" name="select-diagnostico-funcional">
            <option style="font-weight: 100;" value="">--------------</option>
                {% for diagnostico in diagnosticos_funcionales %}
                    <option value="{{ diagnostico.id }}" {% if selected_diagnostico_funcional_id == diagnostico.id|stringformat:"s" %}selected{% endif %}>
                        {{ diagnostico.nombre }}
                    </option>
                {% endfor %}
        </select>

        <div class="mb-3">
            <label for="{{ form.observaciones.id_for_label }}" class="form-label">
                Observaciones
            </label>
            {{ form.observaciones }}
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'paciente_rehab_detail' alta.id_paciente_rehabilitacion.id_paciente_area.id_paciente.id %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
