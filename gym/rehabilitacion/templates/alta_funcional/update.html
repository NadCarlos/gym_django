{% extends 'inicio/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Editar Diagnóstico Funcional</h2>

    <div class="card p-4 shadow-sm">
        <form method="post">
            {% csrf_token %}
            {{ form.id_alta }}
            {{ form.id_usuario }}

            <div class="mb-3">
                <label for="select-diagnostico-funcional" class="form-label">Seleccione un diagnóstico</label>
                <select class="form-control custom-class" id="select-diagnostico-funcional" name="select-diagnostico-funcional" required>
                    <option value="">--------------</option>
                    {% for diagnostico in diagnosticos_funcionales %}
                        <option value="{{ diagnostico.id }}" {% if diagnostico.id == alta_funcional.id_diagnostico_funcional.id %}selected{% endif %}>
                            {{ diagnostico.nombre }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="{{ form.observaciones.id_for_label }}" class="form-label">Observaciones</label>
                {{ form.observaciones }}
            </div>

            <button type="submit" class="btn btn-success">
                <i class="bi bi-save me-1"></i> Guardar
            </button>
            <a href="{% url 'alta_funcional_list' alta.id %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
