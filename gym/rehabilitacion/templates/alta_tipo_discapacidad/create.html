{% extends 'inicio/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Nuevo Tipo de Discapacidad</h2>
    {% if error_message %}
        <div class="alert alert-danger" role="alert">
            {{ error_message }}
        </div>
    {% endif %}
    <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}
        {{ form.id_alta }}
        {{ form.id_usuario }}

        <div class="mb-3">
            <label for="{{ form.id_tipo_discapacidad.id_for_label }}" class="form-label">Seleccione un tipo de discapacidad</label>
            {{ form.id_tipo_discapacidad }}
        </div>

        <div class="mb-3">
            <label for="{{ form.observaciones.id_for_label }}" class="form-label">Observaciones</label>
            {{ form.observaciones }}
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'paciente_rehab_detail' alta.id_paciente_rehabilitacion.id_paciente_area.id_paciente.id %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
