{% extends 'inicio/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
        <h2 class="text-primary mb-0"><i class="bi bi-universal-access"></i> Lista de Tipos de Discapacidad</h2>
    </div>

    <!-- Botones principales -->
    <div class="row">
        <!-- Primera columna -->
        <div class="col-md-8">
            <div class="mb-3 d-flex flex-wrap gap-2">
                <a href="{% url 'tipo_discapacidad_create' %}" class="btn btn-success">
                    <i class="bi bi-universal-access"></i> Nuevo Tipo de Discapacidad
                </a>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="table-responsive">
        <table class="table table-striped table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                </tr>
            </thead>
            <tbody>
                {% for tipo_discapacidad in tipos_discapacidad %}
                    <tr>   
                        <td>{{ tipo_discapacidad.nombre }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
