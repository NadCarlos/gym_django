{% extends "inicio/base.html" %}

{% block content %}
<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
        <h2 class="text-primary mb-0">
            <i class="bi bi-file-earmark-plus me-2"></i>
            Nuevo Informe
        </h2>
        <span class="fw-semibold">
            Paciente: {{ paciente.apellido }}, {{ paciente.nombre }}
        </span>
    </div>

    <!-- Card Formulario -->
    <div class="card shadow-sm">
        <div class="card-body">

            <form method="post">
                {% csrf_token %}
                {{ form.id_paciente }}

                <!-- Fecha -->
                <div class="row mb-3 align-items-center">
                    <label class="col-md-2 col-form-label fw-semibold">
                        Fecha
                    </label>
                    <div class="col-md-4">
                        {{ form.fecha }}
                    </div>
                </div>

                <!-- Profesional -->
                <div class="row mb-3 align-items-center">
                    <label class="col-md-2 col-form-label fw-semibold">
                        Profesional
                    </label>
                    <div class="col-md-6">
                        {{ form.id_profesional }}
                    </div>
                </div>

                <!-- ProfesionalTratamiento -->
                <div class="row mb-3 align-items-center">
                    <label class="col-md-2 col-form-label fw-semibold">
                        Prestacion
                    </label>
                    <div class="col-md-6">
                        {{ form.id_profesional_tratamiento }}
                    </div>
                </div>

                <!-- Observaciones -->
                <div class="row mb-4">
                    <label class="col-md-2 col-form-label fw-semibold">
                        Observaciones
                    </label>
                    <div class="col-md-8">
                        {{ form.observaciones }}
                    </div>
                </div>

                <!-- Botones -->
                <div class="d-flex justify-content-end gap-2">

                    <a href="{% url 'informes' paciente.id %}" 
                       class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left-circle me-1"></i> Cancelar
                    </a>
                    <button type="submit" 
                            id="btn-guardar"
                            class="btn btn-success btn-sm">
                        <i class="bi bi-save me-1"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const selectProfesional = document.getElementById("id_id_profesional");
    const selectPrestacion = document.getElementById("id_id_profesional_tratamiento");
    const prestacionActual = selectPrestacion.value;

    function resetPrestaciones() {
        selectPrestacion.innerHTML = '<option value="">---------</option>';
        selectPrestacion.disabled = true;
    }

    function cargarPrestaciones(profesionalId, selectedId = "") {
        if (!profesionalId) {
            resetPrestaciones();
            return;
        }

        fetch(`/administracion/tratamientos/${profesionalId}/`)
            .then((response) => response.json())
            .then((data) => {
                selectPrestacion.innerHTML = '<option value="">---------</option>';
                data.forEach((prestacion) => {
                    const option = document.createElement("option");
                    option.value = prestacion.id;
                    option.textContent = prestacion.nombre;
                    if (String(prestacion.id) === String(selectedId)) {
                        option.selected = true;
                    }
                    selectPrestacion.appendChild(option);
                });
                selectPrestacion.disabled = false;
            })
            .catch(() => {
                resetPrestaciones();
            });
    }

    selectProfesional.addEventListener("change", function() {
        cargarPrestaciones(this.value);
    });

    if (selectProfesional.value) {
        cargarPrestaciones(selectProfesional.value, prestacionActual);
    } else {
        resetPrestaciones();
    }
});
</script>
{% endblock %}
