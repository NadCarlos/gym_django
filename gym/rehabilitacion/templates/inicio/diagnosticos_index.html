{% extends 'inicio/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row g-4">
        <h2 class="text-start mb-4 text-secondary fw-bold">Menu Diagnosticos y Discapacidades</h2>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm rounded-4 bg-light">
                <div class="card-body">
                    <h5 class="card-title text-muted mb-3"><i class="bi bi-universal-access display-6 me-2 text-primary"></i>Tipo Discapacidad</h5>
                    <a href="{% url 'tipo_discapacidad_list' %}" class="btn btn-outline-primary w-100">Ver Tipo Discapacidad</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm rounded-4 bg-light">
                <div class="card-body">
                    <h5 class="card-title text-muted mb-3"><i class="bi bi-person-exclamation display-6 me-2 text-success"></i>Diagnostico Etiologico</h5>
                    <a href="{% url 'diagnosticos_etiologicos_list' %}" class="btn btn-outline-success w-100">Ver Diagnostico Etiologico</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm rounded-4 bg-light">
                <div class="card-body">
                    <h5 class="card-title text-muted mb-3"><i class="bi bi-person-fill-exclamation display-6 me-2 text-warning"></i>Diagnostico Funcional</h5>
                    <a href="{% url 'diagnosticos_funcionales_list' %}" class="btn btn-outline-warning w-100">Ver Diagnostico Funcional</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
