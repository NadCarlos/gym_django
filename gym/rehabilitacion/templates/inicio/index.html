{% extends 'inicio/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row g-4">
        <h2 class="text-start mb-4 text-secondary fw-bold">Rehabilitacion Pacientes</h2>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm rounded-4 bg-light">
                <div class="card-body">
                    <h5 class="card-title text-muted mb-3"><i class="bi bi-person display-6 me-2 text-primary"></i>Pacientes</h5>
                    <a href="{% url 'pacientes_rehab_list' True %}" class="btn btn-outline-primary w-100">Ver Pacientes</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm rounded-4 bg-light">
                <div class="card-body">
                    <h5 class="card-title text-muted mb-3"><i class="bi bi-shield display-6 me-2 text-success"></i>Obras Sociales</h5>
                    <a href="{% url 'obras_sociales' 2 %}" class="btn btn-outline-success w-100">Ver Obras Sociales</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm rounded-4 bg-light">
                <div class="card-body">
                    <h5 class="card-title text-muted mb-3"><i class="bi bi-list-check display-6 me-2 text-warning"></i>Prestaciones</h5>
                    <a href="{% url 'prestaciones' 2 %}" class="btn btn-outline-warning w-100">Ver Prestaciones</a>
                </div>
            </div>
        </div>
    </div>
    <h2 class="text-start mt-5 mb-4 text-secondary fw-bold">Gestión de Profesionales</h2>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card h-100 shadow-sm rounded-4 bg-light">
                <div class="card-body">
                    <h5 class="card-title text-muted mb-3"><i class="bi bi-file-earmark-person display-6 me-2 text-primary"></i>Profesionales</h5>
                    <a href="{% url 'profesional_rehab_list' %}" class="btn btn-outline-primary w-100">Ver Profesionales</a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100 shadow-sm rounded-4 bg-light">
                <div class="card-body">
                    <h5 class="card-title text-muted mb-3"><i class="bi bi-shield display-6 me-2 text-success"></i>Tratamientos</h5>
                    <a href="#" class="btn btn-outline-success w-100">Ver Tratamientos</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
