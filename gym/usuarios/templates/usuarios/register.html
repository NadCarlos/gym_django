{% extends "home/base.html" %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Registro de Usuario</h2>
    <div class="card p-4 shadow-lg">
        <form method="post">
            {% csrf_token %}       

            <div class="row mb-3">
                <label class="col-md-4 col-form-label text-end fw-bold">Nombre de Usuario:</label>
                <div class="col-md-8">
                    {{ form.username }}
                </div>
            </div>
            
            <div class="row mb-3">
                <label class="col-md-4 col-form-label text-end fw-bold">Email:</label>
                <div class="col-md-8">
                    {{ form.email }}
                </div>
            </div>
            
            <div class="row mb-3">
                <label class="col-md-4 col-form-label text-end fw-bold">Contraseña:</label>
                <div class="col-md-8">
                    {{ form.password1 }}
                </div>
            </div>
            
            <div class="row mb-3">
                <label class="col-md-4 col-form-label text-end fw-bold">Repite la Contraseña:</label>
                <div class="col-md-8">
                    {{ form.password2 }}
                </div>
            </div>
            
            <div class="row mb-3">
                <label class="col-md-4 col-form-label text-end fw-bold">Nombre:</label>
                <div class="col-md-8">
                    {{ form.first_name }}
                </div>
            </div>
            
            <div class="row mb-3">
                <label class="col-md-4 col-form-label text-end fw-bold">Apellido:</label>
                <div class="col-md-8">
                    {{ form.last_name }}
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-md-4 col-form-label text-end fw-bold">Grupo:</label>
                <div class="col-md-8">
                    {{ form.grupo }}
                </div>
            </div>

            <div class="d-flex justify-content-center mt-4">
                <button type="submit" class="btn btn-success px-4 py-2">
                    <i class="bi bi-save"></i> Registrarse
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
